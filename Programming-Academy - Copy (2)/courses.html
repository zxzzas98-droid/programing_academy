<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>إدارة الكورسات</title>

<link rel="stylesheet" href="css/courses.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="container">

    <div class="header">

        <h1>

            <i class="fa-solid fa-book"></i>

            إدارة الكورسات

        </h1>

        <button id="addBtn">

            <i class="fa-solid fa-plus"></i>

            إضافة كورس

        </button>

    </div>

    <div class="search-box">

        <input
        id="searchInput"
        type="text"
        placeholder="ابحث عن كورس...">

    </div>

    <table>

        <thead>

        <tr>

            <th>#</th>

            <th>الصورة</th>

            <th>اسم الكورس</th>

            <th>التصنيف</th>

            <th>المستوى</th>

            <th>الدروس</th>

            <th>السعر</th>

            <th>التحكم</th>

        </tr>

        </thead>

        <tbody id="coursesTable">

        </tbody>

    </table>

</div>



<!-- Course Modal -->

<div class="modal" id="courseModal">

    <div class="modal-content">

        <span class="close" id="closeModal">&times;</span>

        <h2>إضافة كورس جديد</h2>

        <div class="form-group">

            <label>اسم الكورس</label>

            <input type="text" id="courseTitle">

        </div>

        <div class="form-group">

            <label>وصف الكورس</label>

            <textarea id="courseDescription"></textarea>

        </div>

        <div class="form-group">

            <label>التصنيف</label>

            <input type="text" id="courseCategory">

        </div>

        <div class="form-group">

            <label>المستوى</label>

            <select id="courseLevel">

                <option>Beginner</option>

                <option>Intermediate</option>

                <option>Advanced</option>

            </select>

        </div>

        <div class="form-group">

            <label>عدد الدروس</label>

            <input type="number" id="courseLessons">

        </div>

        <div class="form-group">

            <label>المدة</label>

            <input type="text" id="courseDuration">

        </div>

        <div class="form-group">

            <label>السعر</label>

            <input type="number" id="coursePrice">

        </div>

        <div class="form-group">

            <label>صورة الكورس</label>

            <input type="file" id="courseImage">
        </div>

        <button id="saveCourse">

            حفظ الكورس

        </button>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/courses.js"></script>
</body>

</html>
