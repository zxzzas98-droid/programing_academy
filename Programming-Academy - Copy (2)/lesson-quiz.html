<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الاختبار</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<h1>إدارة اختبار الدرس</h1>

<button id="addQuestion">
    إضافة سؤال
</button>

<table>

    <thead>

        <tr>

            <th>السؤال</th>

            <th>الإجابة الصحيحة</th>

            <th>الإجراءات</th>

        </tr>

    </thead>

    <tbody id="questionsTable">

    </tbody>

</table>

<!-- Modal -->

<div id="questionModal" class="modal">

    <div class="modal-content">

        <h2>إضافة سؤال</h2>

        <input id="question" placeholder="السؤال">

        <input id="optionA" placeholder="الاختيار الأول">

        <input id="optionB" placeholder="الاختيار الثاني">

        <input id="optionC" placeholder="الاختيار الثالث">

        <input id="optionD" placeholder="الاختيار الرابع">

        <select id="correctOption">

            <option value="A">A</option>

            <option value="B">B</option>

            <option value="C">C</option>

            <option value="D">D</option>

        </select>

        <button id="saveQuestion">
            حفظ
        </button>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/lesson-quiz.js"></script>

</body>

</html>
