<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة الطالب</title>

<link rel="stylesheet" href="css/style.css">

</head>
<body>

<div class="student-card">

    <h1 id="studentName"></h1>

    <div class="stats">

        <div class="box">

            <h2 id="progressPercent">0%</h2>

            <p>نسبة التقدم</p>

        </div>

        <div class="box">

            <h2 id="coursesCount">0</h2>

            <p>الكورسات</p>

        </div>

        <div class="box">

            <h2 id="certificatesCount">0</h2>

            <p>الشهادات</p>

        </div>
<h2>🏆 شهاداتي</h2>

<div id="certificatesList"></div>
    </div>

    <button id="coursesBtn">
        📚 الكورسات
    </button>

    <button id="logoutBtn">
        🚪 تسجيل الخروج
    </button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/student.js"></script>

</body>
</html>
